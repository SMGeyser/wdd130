<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apodaca</title>
    <link href="styles/style.css" rel="stylesheet">
</head>
<body>
    <header>
        <a class="head_logo" href="index.html"><img src="images/crochetlogo.png"></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">View Products</a></li>
                <li><a href="order.html">Place Order</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1 id="order-title">Place an Order</h2>
        <form id="order">
            <label id="label-keychain" for="order-keychain">Keychains:<br>(Starting at $15)</label>
            <select id="option-keychain" name="order-keychain">
                <option value="axolotl">Axolotl</option>
                <option value="turtle">Turtle</option>
                <option value="unicorn">Unicorn</option>
                <option value="other-stuffed">Other</option>
                <option value="na-keychain">N/A</option>
            </select>
            <label id="label-stuffed" for="order-stuffed">Stuffed Friends:<br>(Starting at $30)</label>
            <select id="option-stuffed" name="order-stuffed">
                <option value="dinosaur">Dinosaur</option>
                <option value="duck">Duck</option>
                <option value="octopus">Octopus</option>
                <option value="other-stuffed">Other</option>
                <option value="na-stuffed">N/A</option>
            </select>
            <label id="label-bag" for="order-bag">Bag:<br>(Starting at $40)</label>
            <select id="option-bag" name="order-bag">
                <option value="solid">Solid</option>
                <option value="hearts">Hearts</option>
                <option value="flowers">Flowers</option>
                <option value="other-bag">Other</option>
                <option value="na-bag">N/A</option>
            </select>
            <label id="label-blanket" for="order-blanket">Baby Blanket:<br>(Starting at $45)<br></label>
            <select id="option-blanket" name="order-blanket">
                <option value="solid">Solid</option>
                <option value="striped">Striped</option>
                <option value="chevron">Chevron</option>
                <option value="granny-square">Granny Square</option>
                <option value="other-blanket">Other</option>
                <option value="na-blanket">N/A</option>
            </select>
        </form>
        <section id="pricing">
            <div class="order-column-1">
                <h2>Keychain</h2>
                <p>Starting at $15</p>
                <h2>Stuffed Friend</h2>
                <p>Starting at $30</p>
                <h2>Bags</h2>
                <p>Starting at $40</p>
            </div>
            <div class="order-column-2">   
                <h2>Baby Blankets</h2>
                <h3>Small Square</h3>
                <p>Starting at $45</p>
                <h3>Small Rectangle</h3>
                <p>Starting at $55</p>
                <h3>Medium Rectangle</h3>
                <p>Starting at $65</p>
            </div> 
        </section>
    </main>
    <footer>
        <a  class="foot_logo" href="#index.html"><img src="images/crochetlogo.png"></a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">View Products</a></li>
            <li><a href="order.html">Place Order</a></li>
        </ul>        
    </footer>
</body>
</html>
