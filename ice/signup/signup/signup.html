<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            width: 40%;
            background-color: white;
            margin: 100px auto;
            border-radius: 25px;
            overflow: hidden;
            position: relative;
            display: grid;
            grid-template-rows: 45% 40% 15%;
            grid-template-columns: 1fr;
            border: 10px solid navy;
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            border: none;
            border-radius: 5px;
            width: 30px;
            height: 30px;
            font-size: 16px;
            z-index: 4;
        }

        #top {
            grid-row: 1/2;
            display: grid;
            grid-template-rows: 1fr 1fr 1fr 2fr;
            grid-template-columns: 1fr 1fr 1fr;
        }

        #JesusPic {
            grid-row: 1/5;
            grid-column: 1/4;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        #daily {
            grid-row: 2/3;
            grid-column: 2/3;
            position: relative;
            z-index: 2;
            text-align: center;
            font-size: large;
            color: white;
            text-shadow: 3px 3px 5px black;
        }

        /*#Sub {
            grid-row: 2/3;
            grid-column: 2/3;
            position: relative;
            z-index: 2;
            text-align: center;
        } */

        #myForm {
            grid-row: 2/3;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 2rem;
            margin: 0;
            margin-top: -20%;
            position: relative;
            z-index: 2;
            background-color: white;
        }

        label {
            grid-column: 1/2;
            padding: 10px;
        }

        input {
            grid-column: 2/3;
            margin: 10px;
        }

        #newsletter {
            grid-column: 1/3;
            display: flex;
            justify-self: center;
            align-items: center;
            gap: 10px;
        }

        #terms {
            grid-column: 1/3;
            display: flex;
            justify-self: center;
            align-items: center;
            gap: 10px;
        }

        #submit {
            grid-column: 1/3;
            display: flex;
            justify-self: center;
        }

        #scriptures {
            grid-row: 3/4;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 0;
            justify-items: center;
            justify-content: space-between;
            gap: 3px;
        }

        .book {
            width: 100%;
            display: block;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <button type="button" id="closeBtn">X</button>
        <header id="top">
            <div id="daily">
            <h2 id="Daily">Daily Feed</h2>
            <h3 id="Sub">Scripture a Day</h3>
            </div>
            <img id="JesusPic" src="images/jesus_feeds_5000.jpeg" alt="Picture of Jesus">
        </header>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section id="newsletter">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section id="terms">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section id="submit">
                <button type="submit">Submit</button>
            </section>
        </form>
        <section id="scriptures">
            <img class="book" src="images/old_testament.jpg" alt="Old Testament">
            <img class="book" src="images/new_testament.jpg" alt="New Testament">
            <img class="book" src="images/book_of_mormon.jpg" alt="Book of Mormon">
            <img class="book" src="images/doctrine_and_covenants.jpg" alt="Doctrine and Covenants">
            <img class="book" src="images/pearl_of_great_price.jpg" alt="Pearl of Great Price">
        </section>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
